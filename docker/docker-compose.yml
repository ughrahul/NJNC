networks:
  njnc_net:

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable pnpm && cd apps/web && pnpm dev"
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-12345}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CONFERENCE_DATE=2028-09-18T00:00:00Z
    volumes:
      - ../:/app
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - api
    networks:
      - njnc_net

  api:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable pnpm &&
             cd apps/api &&
             pnpm prisma generate &&
             pnpm dev"
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:devpassword@postgres:5432/njnc_dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-minimum-64-characters-long-random}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-dev-meili-master-key}
    volumes:
      - ../:/app
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - njnc_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: njnc_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - njnc_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - njnc_net

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-dev-meili-master-key}
    volumes:
      - meili_data:/meili_data
    networks:
      - njnc_net

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - njnc_net

volumes:
  postgres_data:
  redis_data:
  meili_data:
  pnpm_store:
